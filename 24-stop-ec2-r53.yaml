- name: manage ec2 and r53
  hosts: localhost
  connection: local
  vars:
    region: us-east-1
    zone: jioairlines.online
    instances:
      - mysql
      - backend
      - frontend
    desired_state: stopped   # change to 'terminated' if you want to delete

  tasks:
    - name: change ec2 instance state
      amazon.aws.ec2_instance:
        name: "{{ item }}"
        region: "{{ region }}"
        state: "{{ desired_state }}"
      loop: "{{ instances }}"
      register: ec2_state

    - name: print ec2 state change
      ansible.builtin.debug:
        var: ec2_state

    - name: cleanup r53 records when terminated
      amazon.aws.route53:
        state: absent
        zone: "{{ zone }}"
        record: "{{ item }}.{{ zone }}"
        type: A
      loop: "{{ instances }}"
      when: desired_state == "terminated"

    - name: cleanup frontend root record when terminated
      amazon.aws.route53:
        state: absent
        zone: "{{ zone }}"
        record: "{{ zone }}"
        type: A
      when: desired_state == "terminated"
