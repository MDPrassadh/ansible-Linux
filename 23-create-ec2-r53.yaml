- name: create ec2 and r53
  hosts: local
  connection: local
  vars:
    subnet_id: subnet-0648e016f60665d39
    sg_id: sg-02a5e0c53ec4cd644
    ami_id: ami-0ad50334604831820
    instances:
      - mysql
      - backend
      - frontend

  tasks:
    - name: create ec2 instance
      amazon.aws.ec2_instance:
        name: "{{ item }}"
        vpc_subnet_id: "{{ subnet_id }}"
        instance_type: "t3.micro"
        security_group: "{{ sg_id }}"
        image_id: "{{ ami_id }}"
        key_name: "ansible"
      loop: "{{ instances }}"
      register: ec2_instances
